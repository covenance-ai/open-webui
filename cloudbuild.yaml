# Cloud Build spec for our fork. Used by our_webui/deploy.sh.
#
# Why a custom config (vs `gcloud builds submit --tag`): the upstream
# Dockerfile uses BuildKit features ($BUILDPLATFORM), which the classic
# Cloud Build Docker builder does not populate. Enabling DOCKER_BUILDKIT=1
# on the docker step is enough to make it work.

steps:
  - name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - -t
      - $_IMAGE
      - .

images:
  - $_IMAGE

options:
  # E2_HIGHCPU_8 (8 GB) OOMs on vite build; ~8 GB JS heap is needed for
  # pyodide fetch + SvelteKit bundling. E2_HIGHCPU_32 (32 GB) is the right
  # size. europe-west1 Cloud Build doesn't grant default quota for it but
  # submitting to the GLOBAL region (default when --region is omitted) gets
  # access without a quota request. The image still lands in the
  # europe-west1 AR repo we point gcloud run deploy at.
  machineType: E2_HIGHCPU_32

timeout: 1800s
