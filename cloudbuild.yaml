# Cloud Build spec for our fork. Used by our_webui/deploy.sh.
#
# Why a custom config (vs `gcloud builds submit --tag`): the upstream
# Dockerfile uses BuildKit features ($BUILDPLATFORM), which the classic
# Cloud Build Docker builder does not populate. Enabling DOCKER_BUILDKIT=1
# on the docker step is enough to make it work.

steps:
  - name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - -t
      - $_IMAGE
      - .

images:
  - $_IMAGE

options:
  # E2_HIGHCPU_8 (8 GB) OOMs on vite build; the upstream frontend build hits
  # ~8 GB JS heap due to pyodide fetch + bundling. We need ≥16 GB. E2_HIGHCPU_32
  # has region-specific quota that europe-west1 doesn't grant by default;
  # N1_HIGHCPU_32 (32 vCPU, 28.8 GB) has wider quota and is equivalent for
  # this workload.
  machineType: N1_HIGHCPU_32

timeout: 1800s
